<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280, initial-scale=1" />
    <title>ThorFlow Social Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 640px;
        height: 320px;
        overflow: hidden;
        background: #edf5f8;
        color: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", Arial, sans-serif;
      }

      .canvas {
        position: relative;
        width: 1280px;
        height: 640px;
        overflow: hidden;
        background: linear-gradient(135deg, #f8fbff 0%, #eef7f5 48%, #eef4ff 100%);
        transform: scale(0.5);
        transform-origin: left top;
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(37, 99, 235, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(20, 184, 166, 0.055) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(circle at 44% 40%, #000 0%, transparent 78%);
      }

      .left {
        position: absolute;
        left: 72px;
        top: 68px;
        width: 562px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(20, 184, 166, 0.22);
        background: rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        padding: 10px 16px;
        color: #0f766e;
        font-size: 19px;
        font-weight: 750;
        box-shadow: 0 14px 36px rgba(31, 82, 121, 0.08);
      }

      h1 {
        margin: 34px 0 0;
        color: #111827;
        font-size: 76px;
        font-weight: 850;
        letter-spacing: 0;
        line-height: 0.95;
      }

      .sub {
        margin: 24px 0 0;
        color: #1f2937;
        font-size: 35px;
        font-weight: 760;
        line-height: 1.22;
      }

      .body {
        margin: 24px 0 0;
        width: 530px;
        color: #64748b;
        font-size: 24px;
        line-height: 1.45;
      }

      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      .pill {
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.78);
        padding: 12px 17px;
        color: #334155;
        font-size: 18px;
        font-weight: 720;
        box-shadow: 0 18px 36px rgba(20, 38, 70, 0.08);
      }

      .brand {
        position: absolute;
        left: 72px;
        bottom: 52px;
        display: flex;
        align-items: center;
        gap: 14px;
        color: #0f172a;
        font-size: 25px;
        font-weight: 830;
      }

      .logo {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 14px;
        background: linear-gradient(135deg, #14b8a6, #4f7df3);
        color: white;
        font-weight: 900;
        box-shadow: 0 16px 28px rgba(20, 184, 166, 0.32);
      }

      .shot {
        position: absolute;
        right: -44px;
        top: 70px;
        width: 650px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 28px;
        background: white;
        box-shadow: 0 34px 90px rgba(30, 41, 59, 0.22);
        transform: rotate(-2deg);
      }

      .shot img,
      .phone img {
        display: block;
        width: 100%;
      }

      .phone {
        position: absolute;
        right: 120px;
        bottom: -68px;
        width: 270px;
        border: 1px solid rgba(255, 255, 255, 0.85);
        border-radius: 44px;
        background: white;
        padding: 12px;
        box-shadow: 0 34px 90px rgba(15, 23, 42, 0.24);
        transform: rotate(3deg);
      }

      .phone img {
        border-radius: 34px;
      }

      .metric {
        position: absolute;
        right: 420px;
        bottom: 80px;
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.86);
        padding: 20px 24px;
        box-shadow: 0 28px 70px rgba(37, 99, 235, 0.16);
      }

      .metric .n {
        color: #2563eb;
        font-size: 38px;
        font-weight: 850;
      }

      .metric .t {
        margin-top: 3px;
        color: #64748b;
        font-size: 18px;
        font-weight: 720;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <div class="grid"></div>
      <section class="left">
        <div class="eyebrow">围术期管理 · 医患双向提醒</div>
        <h1>ThorFlow</h1>
        <div class="sub">胸外科围术期<br />流程协同平台</div>
        <p class="body">
          从术前检查、手术安排、术后病理到随访，把医生工作台和患者小程序串成一条清晰流程。
        </p>
        <div class="pills">
          <div class="pill">医生流程控制台</div>
          <div class="pill">患者小程序</div>
          <div class="pill">Workflow Engine</div>
        </div>
      </section>
      <div class="brand">
        <div class="logo">T</div>
        <span>ThorFlow Healthcare Workflow</span>
      </div>
      <div class="shot">
        <img src="/readme/dashboard.png" alt="医生端流程控制台" />
      </div>
      <div class="phone">
        <img src="/readme/patient-mini-home.png" alt="患者小程序首页" />
      </div>
      <div class="metric">
        <div class="n">全流程</div>
        <div class="t">检查 · 手术 · 病理 · 随访</div>
      </div>
    </main>
  </body>
</html>
